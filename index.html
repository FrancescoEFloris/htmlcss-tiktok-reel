<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <i class="bi bi-play-btn top-btn"></i>
      <div class="txt-btn-container">
        <p class="txt-btn expl top-btn">Esplora</p>
        <p class="txt-btn folw top-btn">Seguiti</p>
        <p class="txt-btn for-u top-btn">Per te</p>
      </div>
      <i class="bi bi-search top-btn"></i>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="interact-icons">
        <img src="/assets/img/boolean_logo.png" alt="logo di boolean, rombo verde e bianco" class="logo-bool">
        <div class="mid-btn-container">
          <div class="sidebar-icon">
            <i class="bi bi-heart-fill mid-btn"></i>
            <span class="like">588</span>
          </div>
          <div class="sidebar-icon">
            <i class="bi bi-chat-dots-fill mid-btn"></i>
            <span class="like">13</span>
          </div>
          <div class="sidebar-icon">
            <i class="bi bi-bookmark-fill mid-btn"></i>
            <span class="like">638</span>
          </div>
          <div class="sidebar-icon">
            <i class="bi bi-sign-turn-slight-right-fill mid-btn"></i>
            <span class="like">491</span>
          </div>
        </div>
      </div>
    </div>
    <div class="desc-container">
      <h2 class="desc-title">boolean.careers</h2>
      <p class="desc-content">
        Prova il fundamentals camp. 20 ore di corso <br>
        gratuito per... <strong>Vedi altro</strong>
      </p>
    </div>
    <!-- Footer -->
    <footer>

      <div>

        <div class="low-btn-container">
          <div class="tt-icon">
            <i class="bi bi-house-fill low-btn"></i>
            <span class="icon-desc">Home</span>
          </div>
          <div class="tt-icon">
            <i class="bi bi-chat-dots-fill low-btn"></i>
            <span class="icon-desc">Amici</span>
          </div>
          <div class="tt-icon">
            <i class="bi  bi-plus-lg center-low-btn"></i>
          </div>
          <div class="tt-icon">
            <i class="bi bi-chat-square low-btn"></i>
            <span class="icon-desc">Posta in Arrivo</span>
          </div>
          <div class="tt-icon">
            <i class="bi bi-person low-btn"></i>
            <span class="icon-desc">Profilo</span>
          </div>

      </div>
    </footer>
  </div>

</body>

</html>
